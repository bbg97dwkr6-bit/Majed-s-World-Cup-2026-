async function dbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/storage?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (data?.[0]?.value) return JSON.parse(data[0].value);
    return null;
  } catch { return null; }
}

async function dbSet(key, value) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/storage`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ key, value: JSON.stringify(value) })
    });
    return true;
  } catch { return false; }
}

function koMs(m){const[h,mn]=m.kickoff.split(":").map(Number);return new Date(`${m.date}T${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}:00+03:00`).getTime();}
function locked(m,now){return now>=koMs(m)-30*60*1000;}
function fmtTime(k){const[h,m]=k.split(":").map(Number);return`${h%12||12}:${String(m).padStart(2,"0")} ${h<12?"ص":"م"}`;}
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return h.toString(36);}

function Auth({onLogin,toast}) {
  const[mode,setMode]=useState("login");
  const[name,setName]=useState("");
  const[pw,setPw]=useState("");
  const[pw2,setPw2]=useState("");
  const[phone,setPhone]=useState("");
  const[city,setCity]=useState("");
  const[showPw,setShowPw]=useState(false);
  const[busy,setBusy]=useState(false);
  const inp={width:"100%",background:"#0d1421",border:`1px solid ${C.border}`,color:C.text,borderRadius:12,padding:"11px 14px",fontSize:15,outline:"none",direction:"rtl",fontFamily:"inherit"};

  const doLogin=async()=>{
    if(!name.trim()) return toast("أدخل اسمك","error");
    if(!pw) return toast("أدخل كلمة السر","error");
    setBusy(true);
    const users=await dbGet("users")||{};
    setBusy(false);
    if(users[name.trim()]&&users[name.trim()].pw!==hashPw(pw)) return toast("❌ كلمة السر غير صحيحة","error");
    onLogin(name.trim(),users[name.trim()]||{});
    toast(`✅ أهلاً ${name.trim()}!`,"success");
  };

  const doReg=async()=>{
    const n=name.trim();
    if(!n||n.length<2) return toast("الاسم حرفان على الأقل","error");
    if(!phone.trim()||phone.trim().length<9) return toast("أدخل رقم جوال صحيح","error");
    if(!city.trim()) return toast("أدخل مدينتك","error");
    if(!pw||pw.length<4) return toast("كلمة السر ٤ أحرف على الأقل","error");
    if(pw!==pw2) return toast("❌ كلمتا السر غير متطابقتان","error");
    setBusy(true);
    const users=await dbGet("users")||{};
    if(users[n]&&users[n].pw!==hashPw(pw)){setBusy(false);return toast("❌ هذا الاسم مستخدم","error");}
    const profile={pw:hashPw(pw),phone:phone.trim(),city:city.trim(),createdAt:Date.now()};
    await dbSet("users",{...users,[n]:profile});
    setBusy(false);
    onLogin(n,profile);
    toast(`✅ أهلاً ${n}! 🎉`,"success");
  };

  return(
    <div style={{marginTop:20}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48}}>🏆</div>
        <div style={{fontSize:20,fontWeight:900,marginTop:6}}>كأس العالم ٢٠٢٦</div>
        <div style={{fontSize:12,color:C.accent,fontWeight:600}}>لعبة التوقعات</div>
      </div>
      <div style={{display:"flex",background:"#0d1421",borderRadius:14,padding:4,marginBottom:18}}>
        {[{k:"login",l:"تسجيل الدخول"},{k:"register",l:"حساب جديد"}].map(t=>(
          <button key={t.k} onClick={()=>{setMode(t.k);setPw("");setPw2("");setPhone("");setCity("");}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.2s",background:mode===t.k?C.card:"transparent",color:mode===t.k?C.text:C.muted}}>{t.l}</button>
        ))}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:22,display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5,display:"block"}}>👤 الاسم</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="اكتب اسمك..." style={inp}/></div>
        {mode==="register"&&<div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5,display:"block"}}>📱 الجوال</label><input value={phone} onChange={e=>setPhone(e.target.value.replace(/[^0-9+]/g,""))} placeholder="05xxxxxxxx" style={{...inp,padding:"11px 10px"}}/></div>
          <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5,display:"block"}}>🏙️ المدينة</label><input value={city} onChange={e=>setCity(e.target.value)} placeholder="الرياض..." style={{...inp,padding:"11px 10px"}}/></div>
        </div>}
        <div><label style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5,display:"block"}}>🔒 كلمة السر</label>
          <div style={{position:"relative"}}>
            <input value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():null)} type={showPw?"text":"password"} placeholder={mode==="register"?"٤ أحرف على الأقل":"كلمة السر..."} style={{...inp,paddingLeft:42}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:15}}>{showPw?"🙈":"👁"}</button>
          </div>
        </div>
        {mode==="register"&&<div><label style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:5,display:"block"}}>🔒 تأكيد كلمة السر</label>
          <input value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doReg()} type={showPw?"text":"password"} placeholder="أعد كتابة كلمة السر..." style={{...inp,borderColor:pw2&&pw2!==pw?C.red:pw2&&pw2===pw?C.green:C.border}}/>
          {pw2&&pw2!==pw&&<div style={{fontSize:11,color:C.red,marginTop:3}}>كلمتا السر غير متطابقتان</div>}
        </div>}
        <button onClick={mode==="login"?doLogin:doReg} disabled={busy} style={{width:"100%",padding:"13px",borderRadius:11,border:"none",background:busy?"#1e2d40":C.accent,color:busy?C.muted:"#0a0e1a",fontSize:15,fontWeight:800,cursor:busy?"wait":"pointer",fontFamily:"inherit"}}>{busy?"⏳ جارٍ التحقق...":mode==="login"?"🔓 دخول":"🚀 إنشاء الحساب"}</button>
        <div style={{textAlign:"center",fontSize:12,color:C.muted}}>
          {mode==="login"?<span>ماعندك حساب؟ <button onClick={()=>setMode("register")} style={{background:"none",border:"none",color:C.accent,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>سجّل الآن</button></span>:<span>عندك حساب؟ <button onClick={()=>setMode("login")} style={{background:"none",border:"none",color:C.accent,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>سجّل الدخول</button></span>}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:16,fontSize:12,color:C.muted}}>
        <span>⚽ الفائز الصحيح = <b style={{color:C.text}}>١ نقطة</b></span>
        <span>🎯 النتيجة الدقيقة = <b style={{color:C.gold}}>٣ نقاط</b></span>
      </div>
    </div>
  );
}

function App() {
  const[user,setUser]=useState(null);
  const[view,setView]=useState("predict");
  const initP=()=>{const o={};MATCHES.forEach(m=>{o[m.id]={homeScore:0,awayScore:0}});return o;};
  const[preds,setPreds]=useState(initP);
  const[allPreds,setAllPreds]=useState({});
  const[allUsers,setAllUsers]=useState({});
  const[results,setResults]=useState({});
  const[adminIn,setAdminIn]=useState(false);
  const[adminPw,setAdminPw]=useState("");
  const[showAdmin,setShowAdmin]=useState(false);
  const[adminInputs,setAdminInputs]=useState({});
  const[loading,setLoading]=useState(false);
  const[saved,setSaved]=useState(false);
  const[toast,setToast]=useState({msg:"",type:"info"});
  const[now,setNow]=useState(Date.now());
  const today=new Date().toISOString().slice(0,10);
  const[selDay,setSelDay]=useState(ALL_DAYS.includes(today)?today:ALL_DAYS[0]);

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),30000);return()=>clearInterval(t);},[]);
  const showToast=(msg,type="info")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"info"}),3500);};

  const loadData=async()=>{
    const ap=await dbGet("preds"); if(ap) setAllPreds(ap);
    const ar=await dbGet("results"); if(ar) setResults(ar);
    const au=await dbGet("users"); if(au) setAllUsers(au);
  };
  useEffect(()=>{loadData();},[]);
  useEffect(()=>{if(view!=="leaderboard")return;loadData();const t=setInterval(loadData,15000);return()=>clearInterval(t);},[view]);

  const handleLogin=(name,profile)=>{
    setUser({name,profile}); setView("predict");
    dbGet("preds").then(ap=>{if(ap?.[name]?.preds){setPreds(prev=>({...prev,...ap[name].preds}));setSaved(true);}});
  };
  const handleLogout=()=>{setUser(null);setSaved(false);setAdminIn(false);setPreds(initP());};
  const chgPred=(id,field,val)=>{if(locked(MATCHES.find(m=>m.id===id),now))return;setPreds(prev=>({...prev,[id]:{...prev[id],[field]:val}}));};

  const submit=async()=>{
    setLoading(true);
    const updated={...allPreds,[user.name]:{preds:{...(allPreds[user.name]?.preds||{}),...preds},timestamp:Date.now()}};
    await dbSet("preds",updated);
    setAllPreds(updated);setSaved(true);
    showToast("✅ تم حفظ توقعاتك!","success");
    setLoading(false);
  };

  const saveRes=async(id)=>{
    const h=adminInputs[`${id}_h`]??results[id]?.homeScore??0;
    const a=adminInputs[`${id}_a`]??results[id]?.awayScore??0;
    const updated={...results,[id]:{homeScore:+h,awayScore:+a}};
    await dbSet("results",updated);
    setResults(updated);showToast("✅ النتيجة محفوظة","success");
  };

  const calcScore=uid=>{
    const up=allPreds[uid]?.preds||{};let total=0,details={};
    MATCHES.forEach(m=>{
      const p=up[m.id];const a=results[m.id];if(!p||!a)return;
      const aw=a.homeScore>a.awayScore?"home":a.awayScore>a.homeScore?"away":"draw";
      const pw=p.homeScore>p.awayScore?"home":p.awayScore>p.homeScore?"away":"draw";
      let pts=pw===aw?1:0;if(p.homeScore===a.homeScore&&p.awayScore===a.awayScore)pts=3;
      total+=pts;details[m.id]=pts;
    });
    return{total,details};
  };

  const lb=Object.keys(allPreds).map(uid=>({name:uid,...calcScore(uid),predCount:Object.keys(allPreds[uid].preds||{}).length,city:allUsers[uid]?.city||""})).sort((a,b)=>b.total-a.total);
  const myScore=user?calcScore(user.name):null;
  const myRank=user?lb.findIndex(u=>u.name===user.name)+1:null;
  const dayM=MATCHES.filter(m=>m.date===selDay);
  const hasUnlocked=dayM.some(m=>!locked(m,now));

  return(
    <div dir="rtl" style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Tajawal',sans-serif"}}>
      {toast.msg&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#1f1015":toast.type==="success"?"#0f1f18":"#1e2d40",border:`1px solid ${toast.type==="error"?C.red:toast.type==="success"?C.green:C.accent}`,color:C.text,padding:"9px 22px",borderRadius:30,zIndex:9999,fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {user&&<div style={{background:"linear-gradient(135deg,#0d1421,#0a1628)",borderBottom:`1px solid ${C.border}`,padding:"13px 14px 0"}}>
        <div style={{maxWidth:640,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:22}}>🏆</span><div><div style={{fontSize:16,fontWeight:900}}>كأس العالم ٢٠٢٦</div><div style={{fontSize:10,color:C.accent,fontWeight:600}}>لعبة التوقعات</div></div></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{textAlign:"left"}}><div style={{fontSize:13,fontWeight:700}}>👤 {user.name}</div>{myScore&&<div style={{fontSize:11,color:C.gold}}>{myScore.total} نقطة{myRank>0?` • #${myRank}`:""}</div>}</div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <button onClick={()=>adminIn?setAdminIn(false):setShowAdmin(true)} style={{width:26,height:26,borderRadius:"50%",border:`1px solid ${adminIn?C.gold:C.border}`,background:"transparent",color:adminIn?C.gold:C.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
                <button onClick={handleLogout} style={{width:26,height:26,borderRadius:"50%",border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>↩</button>
              </div>
            </div>
          </div>
          <div style={{display:"flex"}}>
            {[{k:"predict",l:"توقعاتي",i:"⚽"},{k:"leaderboard",l:"المتصدرون",i:"🥇"}].map(t=>(
              <button key={t.k} onClick={()=>setView(t.k)} style={{flex:1,padding:"9px 0",background:"transparent",cursor:"pointer",border:"none",borderBottom:`2px solid ${view===t.k?C.accent:"transparent"}`,color:view===t.k?C.accent:C.muted,fontFamily:"inherit",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>{t.i} {t.l}</button>
            ))}
          </div>
        </div>
      </div>}

      {showAdmin&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:18,padding:26,width:"100%",maxWidth:320}}>
          <div style={{fontSize:17,fontWeight:900,marginBottom:4}}>🔐 دخول المشرف</div>
          <input type="password" value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(adminPw===ADMIN_PASSWORD){setAdminIn(true);setShowAdmin(false);showToast("✅ مرحباً يا مشرف!","success");}else showToast("❌ كلمة السر خاطئة","error");setAdminPw("");}}} placeholder="كلمة السر..." style={{width:"100%",background:"#0d1421",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,padding:"10px 13px",fontSize:15,marginBottom:11,outline:"none",direction:"rtl",fontFamily:"inherit"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{if(adminPw===ADMIN_PASSWORD){setAdminIn(true);setShowAdmin(false);showToast("✅ مرحباً يا مشرف!","success");}else showToast("❌ كلمة السر خاطئة","error");setAdminPw("");}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:C.accent,color:"#0a0e1a",fontWeight:800,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>دخول</button>
            <button onClick={()=>{setShowAdmin(false);setAdminPw("");}} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>إلغاء</button>
          </div>
        </div>
      </div>}

      <div style={{maxWidth:640,margin:"0 auto",padding:`${user?"14px":"20px"} 13px 80px`}}>
        {!user&&<Auth onLogin={handleLogin} toast={showToast}/>}

        {user&&view==="predict"&&<div>
          {saved&&<div style={{background:`${C.green}12`,border:`1px solid ${C.green}33`,borderRadius:11,padding:"8px 13px",marginBottom:13,display:"flex",alignItems:"center",gap:8}}><span>✅</span><div style={{fontSize:12,color:C.green,fontWeight:600}}>توقعاتك محفوظة</div></div>}
          <div style={{marginBottom:13}}>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:7}}>اختر اليوم</div>
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
              {ALL_DAYS.map(d=>{const al=MATCHES.filter(m=>m.date===d).every(m=>locked(m,now));const isSel=selDay===d;return<button key={d} onClick={()=>setSelDay(d)} style={{flexShrink:0,padding:"5px 10px",borderRadius:18,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${isSel?C.accent:C.border}`,background:isSel?`${C.accent}18`:"transparent",color:isSel?C.accent:al?C.muted+"88":C.text,display:"flex",alignItems:"center",gap:3}}>{d.slice(8)}{al&&<span style={{fontSize:9}}>🔒</span>}</button>;})}
            </div>
            <div style={{fontSize:13,fontWeight:800,marginTop:7}}>{DAY_LABELS[selDay]} يونيو ٢٠٢٦</div>
          </div>

          {dayM.map(match=>{
            const pred=preds[match.id]||{homeScore:0,awayScore:0};
            const lck=locked(match,now);
            const actual=results[match.id];
            const aw=actual?(actual.homeScore>actual.awayScore?"home":actual.awayScore>actual.homeScore?"away":"draw"):null;
            const pw=pred.homeScore>pred.awayScore?"home":pred.awayScore>pred.homeScore?"away":"draw";
            const pts=actual?(pred.homeScore===actual.homeScore&&pred.awayScore===actual.awayScore?3:pw===aw?1:0):null;
            const ml=Math.round((koMs(match)-now)/60000);
            return<div key={match.id} style={{background:lck?"#0d1320":C.card,border:`1px solid ${lck?"#19263a":C.border}`,borderRadius:15,padding:"12px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{background:lck?"#1a2535":`${C.accent}15`,border:`1px solid ${lck?C.border:C.accent+"33"}`,borderRadius:7,padding:"3px 8px",display:"flex",alignItems:"center",gap:3}}>
                    <span style={{fontSize:11}}>🕐</span><span style={{fontSize:13,fontWeight:800,color:lck?C.muted:C.accent}}>{fmtTime(match.kickoff)}</span>
                  </div>
                  <span style={{fontSize:10,color:C.muted}}>م.{GN[match.group]}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  {pts!==null&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:18,background:pts===3?`${C.gold}20`:pts===1?`${C.green}20`:"rgba(100,116,139,0.1)",color:pts===3?C.gold:pts===1?C.green:C.muted}}>{pts===3?"🎯 +٣":pts===1?"✅ +١":"❌ ٠"}</span>}
                  {lck&&!actual&&<span style={{fontSize:11,color:C.red,fontWeight:600}}>🔒</span>}
                  {!lck&&ml<=60&&ml>0&&<span style={{fontSize:11,color:C.gold,fontWeight:700,background:`${C.gold}15`,borderRadius:7,padding:"2px 6px"}}>⏱ {ml}د</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}><span style={{fontSize:24}}>{match.home.flag}</span><span style={{fontSize:11,fontWeight:700,textAlign:"right",lineHeight:1.2}}>{match.home.name}</span></div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <SI v={pred.homeScore} chg={v=>chgPred(match.id,"homeScore",v)} dis={lck}/>
                    <span style={{color:C.muted,fontWeight:700,fontSize:15}}>:</span>
                    <SI v={pred.awayScore} chg={v=>chgPred(match.id,"awayScore",v)} dis={lck}/>
                  </div>
                  {actual&&<div style={{fontSize:11,background:"#0a0e1a",borderRadius:7,padding:"2px 8px",color:C.muted,border:`1px solid ${C.border}`}}>النتيجة: <b style={{color:C.text}}>{actual.homeScore}-{actual.awayScore}</b></div>}
                </div>
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-start",gap:2}}><span style={{fontSize:24}}>{match.away.flag}</span><span style={{fontSize:11,fontWeight:700,lineHeight:1.2}}>{match.away.name}</span></div>
              </div>
              {!lck&&<div style={{textAlign:"center",marginTop:6,fontSize:11,color:C.muted}}>{pw==="home"?`الفائز: ${match.home.name}`:pw==="away"?`الفائز: ${match.away.name}`:"تعادل ⚖️"}</div>}
              {adminIn&&<div style={{marginTop:8,padding:"8px 10px",background:"#08111e",borderRadius:9,border:`1px dashed ${C.gold}33`}}>
                <div style={{fontSize:11,color:C.gold,fontWeight:700,marginBottom:4}}>⚙️ النتيجة الحقيقية</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="number" min="0" max="20" defaultValue={results[match.id]?.homeScore??""} onChange={e=>setAdminInputs(p=>({...p,[`${match.id}_h`]:+e.target.value}))} style={{width:40,background:"#111827",border:`1px solid ${C.border}`,color:C.text,borderRadius:6,padding:"5px",textAlign:"center",fontSize:15,outline:"none"}}/>
                  <span style={{color:C.muted,fontWeight:700}}>-</span>
                  <input type="number" min="0" max="20" defaultValue={results[match.id]?.awayScore??""} onChange={e=>setAdminInputs(p=>({...p,[`${match.id}_a`]:+e.target.value}))} style={{width:40,background:"#111827",border:`1px solid ${C.border}`,color:C.text,borderRadius:6,padding:"5px",textAlign:"center",fontSize:15,outline:"none"}}/>
                  <button onClick={()=>saveRes(match.id)} style={{padding:"5px 12px",borderRadius:6,border:"none",background:C.gold,color:"#0a0e1a",fontWeight:800,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>حفظ</button>
                  {results[match.id]&&<span style={{fontSize:12,color:C.green}}>✅</span>}
                </div>
              </div>}
            </div>;
          })}
          {hasUnlocked?<button onClick={submit} disabled={loading} style={{width:"100%",padding:"14px",borderRadius:13,border:"none",background:saved?C.green:C.accent,color:"#0a0e1a",fontSize:15,fontWeight:800,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,fontFamily:"inherit",marginTop:3}}>{loading?"⏳ جارٍ الحفظ...":saved?"✅ تحديث توقعاتي":"🚀 إرسال توقعاتي"}</button>:<div style={{textAlign:"center",padding:12,background:"#0d1320",borderRadius:11,border:"1px dashed #19263a",fontSize:12,color:C.muted,marginTop:3}}>🔒 انتهى وقت التوقع لمباريات هذا اليوم</div>}
        </div>}

        {user&&view==="leaderboard"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
            <div><div style={{fontSize:17,fontWeight:900}}>المتصدرون 🏆</div><div style={{fontSize:11,color:C.muted}}>{lb.length} مشارك</div></div>
            <div style={{textAlign:"left",fontSize:11}}><div style={{color:C.muted}}>نتائج مُدخلة</div><div style={{color:C.accent,fontWeight:700}}>{Object.keys(results).length} / {MATCHES.length}</div></div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14,background:C.card,borderRadius:11,padding:11,border:`1px solid ${C.border}`}}>
            <div style={{flex:1,textAlign:"center",borderLeft:`1px solid ${C.border}`}}><div style={{fontSize:19,fontWeight:900,color:C.gold}}>٣</div><div style={{fontSize:11,color:C.muted}}>نتيجة دقيقة</div></div>
            <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:19,fontWeight:900,color:C.green}}>١</div><div style={{fontSize:11,color:C.muted}}>فائز صح</div></div>
          </div>
          {lb.length===0?<div style={{textAlign:"center",padding:44,color:C.muted}}><div style={{fontSize:38,marginBottom:10}}>👥</div><div>لا يوجد مشاركون بعد</div></div>
            :lb.map((u,i)=><div key={u.name} style={{background:i===0?"linear-gradient(135deg,#1a150a,#111827)":C.card,border:`1px solid ${i===0?`${C.gold}44`:u.name===user.name?`${C.accent}44`:C.border}`,borderRadius:15,padding:"11px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i===0?C.gold:i===1?"#9ca3af":i===2?"#b45309":C.border,color:i<3?"#0a0e1a":C.muted,fontSize:i<3?14:12,fontWeight:900,flexShrink:0}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:u.name===user.name?C.accent:C.text,display:"flex",alignItems:"center",gap:5}}>{u.name}{u.name===user.name&&<span style={{fontSize:10,color:C.accent,background:`${C.accent}18`,padding:"1px 5px",borderRadius:9}}>أنت</span>}</div>
                <div style={{fontSize:11,color:C.muted,display:"flex",gap:6}}>{u.city&&<span>🏙️ {u.city}</span>}<span>{u.predCount} توقع</span></div>
              </div>
              <div style={{textAlign:"left",flexShrink:0}}><div style={{fontSize:21,fontWeight:900,color:i===0?C.gold:C.text,lineHeight:1}}>{u.total}</div><div style={{fontSize:10,color:C.muted}}>نقطة</div></div>
            </div>)
          }
          <div style={{background:C.card,border:`1px dashed ${C.accent}44`,borderRadius:15,padding:16,marginTop:14,textAlign:"center"}}>
            <div style={{fontSize:20,marginBottom:5}}>📤</div>
            <div style={{fontWeight:700,marginBottom:3}}>شارك اللعبة مع الشباب</div>
            <button onClick={()=>{navigator.clipboard?.writeText(window.location.href);showToast("✅ تم نسخ الرابط!","success");}} style={{padding:"9px 22px",borderRadius:9,border:"none",background:C.accent,color:"#0a0e1a",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit",marginTop:10}}>📋 نسخ الرابط</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
